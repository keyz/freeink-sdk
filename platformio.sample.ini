; FreeInk SDK — sample platformio.ini
;
; A reference configuration for a firmware project that consumes FreeInk. The
; [base] platform/toolchain/flags mirror what is verified to build against the
; CrossPoint firmware; each [env:*] shows a device target composed from the
; FreeInk device/capability flags.
;
; FreeInk is a set of libraries, not an app — copy the [base] + the [env:*] you
; need into your own project's platformio.ini and point lib_deps at wherever you
; vendored the SDK (git submodule, symlink, or a local path). Here it assumes a
; "freeink-sdk" checkout at the project root.

[base]
; pioarduino Arduino-ESP32 platform (Arduino core 3.3.x / ESP-IDF 5.5.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -std=gnu++2a
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Single framebuffer: the controller's RAM holds the previous frame. Drop this
  ; to use double buffering (needs ~2x MAX_BUFFER_SIZE of RAM).
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1

build_unflags =
  -std=gnu++11

; The Xteink X4 module is wired for DIO / 16 MB.
board_build.flash_mode = dio
board_build.flash_size = 16MB

; FreeInk libraries. The left-hand names are what your code includes
; (<EInkDisplay.h>, <InputManager.h>, ...). SdFat is pulled in automatically as
; a dependency of SDCardManager. Adjust the paths to your SDK checkout.
lib_deps =
  BoardConfig=symlink://freeink-sdk/libs/hardware/BoardConfig
  EInkDisplay=symlink://freeink-sdk/libs/display/FreeInkDisplay
  InputManager=symlink://freeink-sdk/libs/hardware/InputManager
  BatteryMonitor=symlink://freeink-sdk/libs/hardware/BatteryMonitor
  SDCardManager=symlink://freeink-sdk/libs/hardware/SDCardManager
  ; Optional libraries (uncomment as needed):
  ; FrontlightManager=symlink://freeink-sdk/libs/hardware/FrontlightManager
  ; SecureNet=symlink://freeink-sdk/libs/network/SecureNet

; ============================================================================
; Device targets — a build is "devices x capabilities". Capabilities default on
; for the included devices; force with -DFREEINK_CAP_<NAME>=0/1.
; ============================================================================

; --- Xteink X3 + X4 — one ESP32-C3 binary, runtime-selected (setDisplayX3()) ---
; The generic Xteink target: both device profiles (XTEINK_X4 800x480 / SSD1677
; and XTEINK_X3 792x528 / UC8253) are compiled into one bin; the firmware's
; detection calls setDisplayX3() to swap the active profile + driver at runtime.
[env:xteink]
extends = base
board = esp32-c3-devkitm-1
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_X3=1
  -DFREEINK_DEVICE_X4=1

; --- Xteink X4 only — tightest ESP32-C3 binary (links SSD1677 only) -----------
[env:xteink_x4]
extends = base
board = esp32-c3-devkitm-1
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_X4=1

; --- M5Stack PaperColor — ESP32-S3, fast native ED2208 (default) --------------
; The native driver interrupts the 6-color full refresh at ~340 ms for
; reading-speed monochrome (see README "M5Stack PaperColor refresh behavior").
[env:m5paper]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_M5=1

; --- M5Stack PaperColor — M5's official M5GFX/M5Unified backend (opt-in) -------
; Slower vendor path; pulls the M5 libraries only on this env.
[env:m5paper_official]
extends = env:m5paper
build_flags =
  ${env:m5paper.build_flags}
  -DFREEINK_M5_OFFICIAL=1
lib_deps =
  ${base.lib_deps}
  m5stack/M5Unified
  m5stack/M5GFX
  m5stack/M5PM1

; --- de-link — ESP32-S3, SSD1677 + PWM frontlight (CAP_FRONTLIGHT auto-on) -----
[env:delink]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_DELINK=1
  ; -DFREEINK_DISPLAY_FLIPPED=1   ; uncomment if the panel is mounted upside down

; --- Murphy M3 — ESP32-S3, UC8253 + CHSC6x touch + frontlight -----------------
; (CAP_TOUCH and CAP_FRONTLIGHT auto-on for this device.)
[env:murphy]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_MURPHY=1

; --- Example: a device backed by an external display library ------------------
; Some panels are driven by a third-party library instead of a native FreeInk
; PanelDriver (e.g. LilyGo T5 S3 Pro / M5 Paper S3 via EPD_Painter, GT911 touch
; via SensorLib). Add those libs to the device's env only — the driver code
; #includes them behind its FREEINK_DEVICE_* guard, so LDF links them just for
; this env and other devices (X4/X3/M5) stay lean.
;
; [env:lilygo_pro]
; extends = base
; board = esp32-s3-devkitc1-n16r8
; board_build.mcu = esp32s3
; build_flags =
;   ${base.build_flags}
;   -DFREEINK_DEVICE_LILYGO=1
;   -DFREEINK_CAP_TOUCH=1
; lib_deps =
;   ${base.lib_deps}
;   https://github.com/tonywestonuk/EPD_Painter.git#<pinned-sha>
;   https://github.com/lewisxhe/SensorLib.git#<pinned-sha>

; --- Example: enable the wolfSSL TLS 1.3 networking stack ----------------------
; Add SecureNet to lib_deps + a wolfSSL source lib, then:
;   -DFREEINK_NET_WOLFSSL=1
