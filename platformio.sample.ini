; FreeInk SDK — sample platformio.ini
;
; A reference configuration for a firmware project that consumes FreeInk. The
; [base] platform/toolchain/flags mirror what is verified to build against the
; CrossPoint firmware; each [env:*] shows a device target composed from the
; FreeInk device/capability flags.
;
; FreeInk is a set of libraries, not an app — copy the [base] + the [env:*] you
; need into your own project's platformio.ini and point lib_deps at wherever you
; vendored the SDK (git submodule, symlink, or a local path). Here it assumes a
; "freeink-sdk" checkout at the project root.

[base]
; pioarduino Arduino-ESP32 platform (Arduino core 3.3.x / ESP-IDF 5.5.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -std=gnu++2a
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Single framebuffer: the controller's RAM holds the previous frame. Drop this
  ; to use double buffering (needs ~2x MAX_BUFFER_SIZE of RAM).
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1

build_unflags =
  -std=gnu++11

; The Xteink X4 module is wired for DIO / 16 MB.
board_build.flash_mode = dio
board_build.flash_size = 16MB

; FreeInk libraries. The left-hand names are what your code includes
; (<EInkDisplay.h>, <InputManager.h>, ...). SdFat is pulled in automatically as
; a dependency of SDCardManager. Adjust the paths to your SDK checkout.
lib_deps =
  BoardConfig=symlink://freeink-sdk/libs/hardware/BoardConfig
  EInkDisplay=symlink://freeink-sdk/libs/display/FreeInkDisplay
  InputManager=symlink://freeink-sdk/libs/hardware/InputManager
  BatteryMonitor=symlink://freeink-sdk/libs/hardware/BatteryMonitor
  SDCardManager=symlink://freeink-sdk/libs/hardware/SDCardManager
  ; Optional libraries (uncomment as needed):
  ; FrontlightManager=symlink://freeink-sdk/libs/hardware/FrontlightManager
  ; SecureNet=symlink://freeink-sdk/libs/network/SecureNet

; ============================================================================
; Device targets — a build is "devices x capabilities". Capabilities default on
; for the included devices; force with -DFREEINK_CAP_<NAME>=0/1.
; ============================================================================

; --- Xteink X3 + X4 — one ESP32-C3 binary, runtime-selected (setDisplayX3()) ---
; The generic Xteink target: both device profiles (XTEINK_X4 800x480 / SSD1677
; and XTEINK_X3 792x528 / UC8253) are compiled into one bin; the firmware's
; detection calls setDisplayX3() to swap the active profile + driver at runtime.
[env:xteink]
extends = base
board = esp32-c3-devkitm-1
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_X3=1
  -DFREEINK_DEVICE_X4=1

; --- Xteink X4 only — tightest ESP32-C3 binary (links SSD1677 only) -----------
[env:xteink_x4]
extends = base
board = esp32-c3-devkitm-1
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_X4=1

; --- M5Stack PaperColor — ESP32-S3, fast native ED2208 (default) --------------
; The native driver interrupts the 6-color full refresh at ~340 ms for
; reading-speed monochrome (see README "M5Stack PaperColor refresh behavior").
[env:m5paper]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_M5=1

; --- M5Stack PaperColor — M5's official M5GFX/M5Unified backend (opt-in) -------
; Slower vendor path; pulls the M5 libraries only on this env.
[env:m5paper_official]
extends = env:m5paper
build_flags =
  ${env:m5paper.build_flags}
  -DFREEINK_M5_OFFICIAL=1
lib_deps =
  ${base.lib_deps}
  m5stack/M5Unified
  m5stack/M5GFX
  m5stack/M5PM1

; --- de-link — ESP32-S3, SSD1677 + PWM frontlight (CAP_FRONTLIGHT auto-on) -----
[env:delink]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_DELINK=1
  ; SD on de-link is 4-bit SDMMC. SdFat can't drive SDIO, so FreeInk mounts an
  ; FsVolume on a native esp-idf SDMMC block device — that needs SdFat's generic
  ; block-device interface enabled:
  -DUSE_BLOCK_DEVICE_INTERFACE=1
  ; (FREEINK_SD_SDMMC auto-enables for de-link; override with -DFREEINK_SD_SDMMC=0
  ; to force the SPI/SdFat path.)
  ; Orientation: de-link's current PCB mounts the panel upside down vs the X4. The
  ; next PCB matches the X4, so the profile ships NO_FLIP. Current-PCB owners can
  ; set ROTATE_180 in the de-link BoardProfile (hardware mirror) instead of a
  ; firmware software-rotate.

; --- Murphy M3 — ESP32-S3, UC8253 + CHSC6x touch + frontlight -----------------
; (CAP_TOUCH and CAP_FRONTLIGHT auto-on for this device.)
[env:murphy]
extends = base
board = esp32-s3-devkitc1-n16r8
board_build.mcu = esp32s3
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_MURPHY=1

; --- LilyGo T5 S3 (4.7" ED047TC1) — ESP32-S3, raw-parallel EPD via LovyanGFX ---
; The panel has no on-glass controller, so FreeInk's LgfxEpdDriver wraps
; LovyanGFX's Panel_EPD (bundled in m5stack/M5GFX) — gated behind the derived
; FREEINK_DRIVER_LGFX_EPD flag, so the M5GFX lib is linked only on this env and
; other devices stay lean. (CAP_TOUCH auto-on for this device.)
;
; The driver has no universal default: the board must inject its parallel-bus pins
; + power hooks (PMIC/expander sequence) via an LgfxEpdConfig — define
; `const LgfxEpdConfig& yourCfg();` in namespace freeink and build with
; -DFREEINK_LGFX_EPD_CONFIG=yourCfg. See docs/lilygo-t5s3-support.md.
;
; [env:lilygo_t5s3]
; extends = base
; board = esp32-s3-devkitc1-n16r8
; board_build.mcu = esp32s3
; build_flags =
;   ${base.build_flags}
;   -DFREEINK_DEVICE_LILYGO=1
;   -DFREEINK_LGFX_EPD_CONFIG=lilygoT5S3LgfxConfig
; lib_deps =
;   ${base.lib_deps}
;   m5stack/M5GFX @ 0.2.20

; --- M5Paper v1.1 (4.7" ED047TC1 / IT8951E) — classic ESP32 -------------------
; A third MCU family: the original ESP32 (ESP32-D0WDQ6), not C3 or S3, so this is
; always its own binary. The panel sits behind an IT8951E timing controller; the
; hand-rolled FreeInk IT8951 driver owns its SPI end to end (no extra libraries).
; GT911 touch is auto-on (CAP_TOUCH). The framebuffer is landscape 960x540 and the
; driver rotates onto the 540x960 portrait panel — the rotation auto-resolves from
; the panel's reported orientation, or inject It8951Config via -DFREEINK_IT8951_CONFIG.
;
; POWER LATCH (firmware responsibility, not the SDK): M5Paper holds its own power
; through a MOSFET on GPIO2 — drive it HIGH in setup() or the board powers off the
; instant USB is unplugged:  pinMode(2, OUTPUT); digitalWrite(2, HIGH);
; The IT8951 driver enables the EPD rail (GPIO23) itself.
[env:m5paper_v11]
extends = base
board = esp32dev  ; classic ESP32 (M5Paper is ESP32-D0WDQ6 + 8MB PSRAM / 16MB flash)
board_build.mcu = esp32
board_build.flash_mode = qio
build_flags =
  ${base.build_flags}
  ; M5Paper's 63KB framebuffer won't fit in classic-ESP32 DRAM alongside the
  ; firmware, so FreeInk auto-enables FREEINK_FB_PSRAM (framebuffer in PSRAM heap)
  ; for this device. That needs PSRAM turned on:
  -DBOARD_HAS_PSRAM
  -DFREEINK_DEVICE_M5PAPER=1

; --- Example: enable the wolfSSL TLS 1.3 networking stack ----------------------
; Add SecureNet to lib_deps + a wolfSSL source lib, then:
;   -DFREEINK_NET_WOLFSSL=1
